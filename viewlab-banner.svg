  <line x1="0" y1="375" x2="1200" y2="375" stroke="#2c2c40" stroke-width="1"/>
  <circle cx="20" cy="387" r="4" fill="#00ff88"/>
  <text x="32" y="391" font-family="monospace" font-size="10" fill="#5a5a78">localhost:3000 — running</text>
  <text x="600" y="391" font-family="monospace" font-size="10" fill="#5a5a78" text-anchor="middle">Built by Suraj Patil · QA Engineer</text>
